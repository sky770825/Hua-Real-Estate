    <style>

            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;

            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 5px;
            font-weight: 400;
        }

        .header h2 {
            font-size: 1.8em;
            margin-bottom: 15px;
            font-weight: 300;
            opacity: 0.95;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-section {
            padding: 40px;
        }

        .search-box {
            position: relative;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .bni-btn {
            background: white;
            color: #ff6b6b;
            border: 2px solid #ff6b6b;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.2);
        }

        .bni-btn:hover {
            background: #ff6b6b;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
        }

        .search-input {
            width: 100%;
            padding: 10px 15px;
            font-size: 1em;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            outline: none;
            transition: all 0.3s ease;
            background: #f8f9fa;
            max-width: 250px;
            margin: 0 auto;
            text-align: center;
        }

        .search-input:focus {
            border-color: #4facfe;
            background: white;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.3);
        }

        .search-input::placeholder {
            color: #999;
        }

        .results-section {
            margin-top: 30px;
        }

        .result-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 5px solid #4facfe;
            transition: all 0.3s ease;
        }

        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .name-display {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .name-part {
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            min-width: 120px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .name-part:hover {
            border-color: #4facfe;
            background: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.2);
        }

        .name-part:active {
            transform: translateY(0);
        }

        .name-part.copied {
            border-color: #56ab2f;
            background: #e8f5e8;
        }

        .name-part::after {
            content: '📋';
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 0.8em;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .name-part:hover::after {
            opacity: 0.7;
        }

        .name-label {
            font-size: 0.9em;
            color: #666;
            font-weight: normal;
        }

        .copy-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .copy-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        .copy-btn.copied {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%);
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.2em;
        }

        .no-results i {
            font-size: 3em;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .member-code {
            font-size: 0.9em;
            color: #888;
            margin-top: 10px;
        }

        .quick-menu-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            margin: 10px 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
            flex: 1;
        }

        .quick-menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
        }

        .usage-section {
            margin: 10px 0;
            background: #f8f9fa;
            border-radius: 15px;
            border: 2px solid #e0e0e0;
            overflow: visible;
            flex: 2;
            position: relative;
        }

        .header-row {
            display: flex;
            gap: 15px;
            align-items: stretch;
        }

        .usage-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .usage-header:hover {
            background: linear-gradient(135deg, #3d8bfe 0%, #00d4fe 100%);
        }

        .usage-title {
            font-size: 1.1em;
            font-weight: bold;
        }

        .usage-toggle {
            font-size: 1.2em;
            transition: transform 0.3s ease;
        }

        .usage-toggle.expanded {
            transform: rotate(180deg);
        }

        .usage-content {
            padding: 20px;
            display: none;
            line-height: 1.6;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow-y: auto;
        }

        .usage-content.show {
            display: block;
        }

        .usage-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }

        .usage-overlay.show {
            display: block;
        }

        .usage-close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5em;
            cursor: pointer;
            color: #666;
            font-weight: bold;
        }

        .usage-close:hover {
            color: #333;
        }

        .usage-step {
            margin-bottom: 15px;
            padding: 10px;
            background: white;
            border-radius: 10px;
            border-left: 4px solid #4facfe;
        }

        .highlight {
            background: linear-gradient(120deg, #ff6b6b 0%, #ff8e8e 100%);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .highlight-blue {
            background: linear-gradient(120deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .quick-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            padding: 20px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .quick-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .quick-menu-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .quick-menu-close {
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quick-menu-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quick-menu-item {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .quick-menu-item:hover {
            border-color: #4facfe;
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.2);
        }

        .quick-menu-member-header {
            display: flex;
            flex-direction: column;
            gap: 0px;
        }

        .quick-menu-member-title {
            font-size: 0.75em;
            color: #ff6b6b;
            font-weight: bold;
            background: #ffe0e0;
            padding: 2px 6px;
            border-radius: 3px;
            text-align: center;
            align-self: flex-start;
        }

        .quick-menu-member-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .quick-menu-member-info {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .quick-menu-member-code {
            font-size: 0.9em;
            color: #666;
            font-weight: bold;
            background: #e0e0e0;
            padding: 4px 8px;
            border-radius: 5px;
            min-width: 30px;
            text-align: center;
        }

        .quick-menu-member-name {
            font-size: 1.1em;
            color: #333;
            font-weight: bold;
        }

        .quick-menu-name-parts {
            display: flex;
            gap: 8px;
        }

        .quick-menu-name-part {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 6px 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
            min-width: 60px;
        }

        .quick-menu-name-part:hover {
            border-color: #4facfe;
            background: #f8f9fa;
            transform: translateY(-1px);
        }

        .quick-menu-name-part.copied {
            border-color: #56ab2f;
            background: #e8f5e8;
        }

        .quick-menu-name-label {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 2px;
        }

        .quick-menu-name-value {
            font-size: 1em;
            color: #333;
            font-weight: bold;
        }


        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }

                margin-bottom: 8px;
            }

            .header p {
                font-size: 0.9em;
            }

            .name-display {
                flex-direction: row;
                gap: 10px;
            }
            
            .name-part {
                flex: 1;
                min-width: auto;
            }
            
            .copy-buttons {
                justify-content: center;
            }
            
            .search-section {
                padding: 15px;
            }

            .quick-menu {
                width: 98%;
                padding: 10px;
                max-height: 95vh;
            }

            .quick-menu-item {
                padding: 8px;
                margin-bottom: 5px;
            }

            .quick-menu-member-title {
                font-size: 0.7em;
                padding: 1px 4px;
            }

            .quick-menu-member-code {

                padding: 2px 6px;
                min-width: 25px;
            }

            .quick-menu-member-name {

            }

            .quick-menu-name-part {

            }

            .quick-menu-name-label {

            }

            .quick-menu-name-value {

            }

            .quick-menu-member-content {
                gap: 8px;
            }

            .quick-menu-name-parts {
                gap: 5px;
            }

            .header-row {
                flex-direction: row;
                gap: 8px;
            }

            .usage-section {
                margin: 5px 0;
                flex: 2;
            }

            .usage-header {
                padding: 10px 15px;
            }

            .usage-title {
                font-size: 0.9em;
            }

            .quick-menu-btn {
                margin: 5px 0;
                padding: 10px 12px;
                font-size: 0.8em;
                flex: 1;
            }

                padding: 6px 12px;
                font-size: 0.8em;
            }

        // 切換使用說明
        function toggleUsage() {
            const content = document.getElementById('usageContent');
            const overlay = document.getElementById('usageOverlay');
            const toggle = document.querySelector('.usage-toggle');
            
            if (content.classList.contains('show')) {
                content.classList.remove('show');
                overlay.classList.remove('show');
                toggle.classList.remove('expanded');
            } else {
                content.classList.add('show');
                overlay.classList.add('show');
                toggle.classList.add('expanded');
            }
        }

        // 分離姓名的函數
        function separateName(fullName) {
            if (!fullName) return { surname: '', givenName: '' };
            
            // 移除英文部分，只保留中文
            const chineseName = fullName.replace(/[a-zA-Z\s]/g, '').trim();
            
            // 如果沒有中文，處理純英文姓名
            if (chineseName.length === 0) {
                const englishName = fullName.trim();
                const nameParts = englishName.split(/\s+/);
                
                if (nameParts.length === 2) {
                    // 英文姓名：第一個詞是名，第二個詞是姓
                    return {
                        surname: nameParts[1],
                        givenName: nameParts[0]
                    };
                } else if (nameParts.length === 1) {
                    // 單一英文名
                    return {
                        surname: nameParts[0],
                        givenName: ''
                    };
                } else {
                    // 多個詞的英文名
                    return {
                        surname: nameParts[nameParts.length - 1],
                        givenName: nameParts.slice(0, -1).join(' ')
                    };
                }
            }
            
            // 處理中文姓名
            if (chineseName.length === 2) {
                // 兩個字：第一個字是姓，第二個字是名
                return {
                    surname: chineseName[0],
                    givenName: chineseName[1]
                };
            } else if (chineseName.length === 3) {
                // 三個字：第一個字是姓，後面兩個字是名
                return {
                    surname: chineseName[0],
                    givenName: chineseName.substring(1)
                };
            } else if (chineseName.length === 4) {
                // 四個字：前兩個字是姓，後兩個字是名
                return {
                    surname: chineseName.substring(0, 2),
                    givenName: chineseName.substring(2)
                };
            } else {
                // 其他情況：第一個字是姓，其餘是名
                return {
                    surname: chineseName[0],
                    givenName: chineseName.substring(1)
                };
            }
        }

        // 搜尋功能
        function searchMember(code) {
            const member = memberDatabase[code];
            if (!member) {
                return null;
            }
            
            const { surname, givenName } = separateName(member.name);
            return {
                code: code,
                fullName: member.name,
                email: member.email,
                surname: surname,
                givenName: givenName
            };
        }

        // 複製到剪貼簿
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                return true;
            } catch (err) {
                // 備用方法
                const textArea = document.createElement('textarea');
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                return true;
            }
        }

        // 顯示搜尋結果
        function displayResults(member) {
            const resultsSection = document.getElementById('resultsSection');
            
            if (!member) {
                resultsSection.innerHTML = `
                    <div class="no-results">
                        <i>❌</i>
                        <p>找不到該會員代碼</p>
                    </div>
                `;
                return;
            }

            resultsSection.innerHTML = `
                <div class="result-card">
                    <div class="name-display">
                        <div class="name-part" onclick="copyText('${member.surname}', this)">
                            <div class="name-label">姓</div>
                            <div>${member.surname}</div>
                        </div>
                        <div class="name-part" onclick="copyText('${member.givenName}', this)">
                            <div class="name-label">名</div>
                            <div>${member.givenName}</div>
                        </div>
                    </div>
                    
                    <div class="member-code">會員編號: ${member.code}</div>
                    ${member.email ? `<div class="member-code">Email: ${member.email}</div>` : ''}
                    
                    <div class="copy-buttons">
                        <button class="copy-btn" onclick="copyText('${member.surname}', this)">
                            📋 複製姓
                        </button>
                        <button class="copy-btn" onclick="copyText('${member.givenName}', this)">
                            📋 複製名
                        </button>
                        <button class="copy-btn" onclick="copyText('${member.fullName}', this)">
                            📋 複製全名
                        </button>
                        ${member.email ? `<button class="copy-btn" onclick="copyText('${member.email}', this)">
                            📋 複製Email
                        </button>` : ''}
                    </div>
                </div>
            `;
        }

        // 複製文字並顯示反饋
        async function copyText(text, element) {
            const success = await copyToClipboard(text);
            
            if (success) {
                // 判斷是按鈕還是框
                const isButton = element.classList.contains('copy-btn');
                const isNamePart = element.classList.contains('name-part');
                
                if (isButton) {
                    const originalText = element.innerHTML;
                    element.innerHTML = '✅ 已複製';
                    element.classList.add('copied');
                    
                    setTimeout(() => {
                        element.innerHTML = originalText;
                        element.classList.remove('copied');
                    }, 2000);
                } else if (isNamePart) {
                    element.classList.add('copied');
                    
                    setTimeout(() => {
                        element.classList.remove('copied');
                    }, 2000);
                }
            }
        }

        // 事件監聽器
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const code = e.target.value.trim();
            
            if (code === '') {
                document.getElementById('resultsSection').innerHTML = `
                    <div class="no-results">
                        <i>🔍</i>
                        <p>請輸入會員編號開始搜尋</p>
                    </div>
                `;
                return;
            }
            
            const member = searchMember(code);
            displayResults(member);
        });

        // 支援Enter鍵搜尋
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const code = e.target.value.trim();
                const member = searchMember(code);
                displayResults(member);
            }
        });
    </script>
